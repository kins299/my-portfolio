<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goutham Sekhar — Tech Advisor</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Syne:wght@400;600&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">

<style>
:root {
  --navy: #0b1628;
  --gold: #c9a84c;
  --gold-light: #e2c97e;
  --cream: #faf7f0;
}

body {
  margin: 0;
  background: var(--navy);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: 'DM Sans', sans-serif;
}

/* Profile Container */
.profile-wrap {
  position: relative;
  width: 340px;
  height: 340px;
}

/* Circular Frame */
.profile-circle {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  overflow: hidden;
  border: 2px solid rgba(201,168,76,0.35);
  position: relative;
}

/* Glow Effect */
.profile-circle::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  box-shadow: 0 0 60px rgba(201,168,76,0.15);
  pointer-events: none;
}

/* Image Styling */
.profile-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center 20%;
  filter: contrast(1.08) brightness(1.02);
  display: block;
}
</style>
</head>

<body>

<div class="profile-wrap">
  <div class="profile-circle">
    <img src="profile.jpg.png" class="profile-img" alt="Goutham Sekhar">
  </div>
</div>

</body>
</html>
