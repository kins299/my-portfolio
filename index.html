<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goutham Sekhar — Tech Advisor · Startup Builder</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --navy: #0b1628;
  --navy-mid: #112040;
  --gold: #c9a84c;
  --gold-light: #e2c97e;
  --cream: #faf7f0;
  --muted: #8899bb;
  --card-bg: rgba(17,32,64,0.7);
  --border: rgba(201,168,76,0.2);
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  background:var(--navy);
  color:var(--cream);
  font-family:'DM Sans',sans-serif;
}

/* HERO */
.hero{
  min-height:100vh;
  display:grid;
  grid-template-columns:1fr 1fr;
  align-items:center;
  padding:80px;
}

/* LEFT */
.hero-left h1{
  font-family:'Cormorant Garamond',serif;
  font-size:4rem;
  font-weight:300;
}
.hero-left em{
  color:var(--gold-light);
}

.hero-left p{
  margin-top:20px;
  color:#b8c8dd;
  max-width:400px;
  line-height:1.7;
}

/* RIGHT PROFILE */
.hero-right{
  display:flex;
  justify-content:center;
  align-items:center;
}

.profile-wrap{
  position:relative;
  width:340px;
  height:340px;
}

.profile-circle{
  width:100%;
  height:100%;
  border-radius:50%;
  overflow:hidden;
  border:2px solid rgba(201,168,76,0.35);
  position:relative;
}

/* Glow */
.profile-circle::after{
  content:'';
  position:absolute;
  inset:0;
  border-radius:50%;
  box-shadow:0 0 60px rgba(201,168,76,0.15);
  pointer-events:none;
}

/* Image */
.profile-img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center 20%;
  filter:contrast(1.08) brightness(1.02);
}

/* FRAME */
.profile-frame{
  position:absolute;
  inset:-14px;
  border:1px solid var(--border);
  border-radius:50%;
}

/* RESPONSIVE */
@media(max-width:900px){
  .hero{
    grid-template-columns:1fr;
    text-align:center;
  }
  .hero-right{
    margin-top:40px;
  }
}
</style>
</head>

<body>

<section class="hero">

  <!-- LEFT CONTENT -->
  <div class="hero-left">
    <h1>Goutham<br><em>Sekhar</em></h1>
    <p>
      Technology Advisor · Startup Accelerator · Compliance Strategist.  
      Building the infrastructure for tomorrow's startups.
    </p>
  </div>

  <!-- RIGHT PROFILE -->
  <div class="hero-right">
    <div class="profile-wrap">
      <div class="profile-frame"></div>

      <div class="profile-circle">
        <img src="profile.jpg.png" class="profile-img" alt="Goutham Sekhar">
      </div>

    </div>
  </div>

</section>

</body>
</html>
